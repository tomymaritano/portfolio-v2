name: Daily log

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Override date (YYYY-MM-DD). Defaults to today in ART."
        required: false
        type: string

concurrency:
  group: daily-log
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Generate log entry
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'github' }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ACTIVITY_GITHUB_TOKEN: ${{ secrets.ACTIVITY_GITHUB_TOKEN }}
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GH_MODEL: ${{ vars.GH_MODEL }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          INPUT_DATE: ${{ inputs.date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            # Validate format YYYY-MM-DD before forwarding to the script
            if ! printf '%s' "$INPUT_DATE" | grep -Eq '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
              echo "Invalid date format. Expected YYYY-MM-DD." >&2
              exit 1
            fi
            npm run log:daily -- --date="$INPUT_DATE"
          else
            npm run log:daily
          fi

      - name: Commit and push
        run: |
          if git diff --quiet src/content/logs/; then
            echo "No changes in src/content/logs/, nothing to commit"
            exit 0
          fi
          git config user.name "log-bot"
          git config user.email "log-bot@users.noreply.github.com"
          git add src/content/logs/
          git commit -m "log: $(date -u +%Y-%m-%d)"
          git push
