name: Daily log

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Single day (YYYY-MM-DD). Mutually exclusive with from/to."
        required: false
        type: string
      from:
        description: "Backfill start date (YYYY-MM-DD). Requires `to`."
        required: false
        type: string
      to:
        description: "Backfill end date (YYYY-MM-DD). Requires `from`."
        required: false
        type: string

concurrency:
  group: daily-log
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Generate log entry
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'github' }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ACTIVITY_GITHUB_TOKEN: ${{ secrets.ACTIVITY_GITHUB_TOKEN }}
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GH_MODEL: ${{ vars.GH_MODEL }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL }}
          INPUT_DATE: ${{ inputs.date }}
          INPUT_FROM: ${{ inputs.from }}
          INPUT_TO: ${{ inputs.to }}
        run: |
          DATE_RE='^[0-9]{4}-[0-9]{2}-[0-9]{2}$'
          if [ -n "$INPUT_FROM" ] || [ -n "$INPUT_TO" ]; then
            if [ -z "$INPUT_FROM" ] || [ -z "$INPUT_TO" ]; then
              echo "Backfill mode requires both 'from' and 'to'." >&2
              exit 1
            fi
            if ! printf '%s' "$INPUT_FROM" | grep -Eq "$DATE_RE"; then
              echo "Invalid 'from' format. Expected YYYY-MM-DD." >&2
              exit 1
            fi
            if ! printf '%s' "$INPUT_TO" | grep -Eq "$DATE_RE"; then
              echo "Invalid 'to' format. Expected YYYY-MM-DD." >&2
              exit 1
            fi
            npm run log:daily -- --from="$INPUT_FROM" --to="$INPUT_TO"
          elif [ -n "$INPUT_DATE" ]; then
            if ! printf '%s' "$INPUT_DATE" | grep -Eq "$DATE_RE"; then
              echo "Invalid date format. Expected YYYY-MM-DD." >&2
              exit 1
            fi
            npm run log:daily -- --date="$INPUT_DATE"
          else
            npm run log:daily
          fi

      - name: Commit and push
        run: |
          if git diff --quiet src/content/logs/; then
            echo "No changes in src/content/logs/, nothing to commit"
            exit 0
          fi
          git config user.name "log-bot"
          git config user.email "log-bot@users.noreply.github.com"
          git add src/content/logs/
          git commit -m "log: $(date -u +%Y-%m-%d)"
          git push
